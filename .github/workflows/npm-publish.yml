name: NPM Publish Workflow

on:
  push:
    branches:
      - beta
      - main
    paths:
      - "package.json"

jobs:
  publish-beta:
    name: Publish Beta Package
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/beta'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking $NAME@$VERSION ..."
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already exists on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION not found on npm — will publish."
          fi

      - name: Upgrade npm (OIDC Trusted Publishing requires npm >= 11.5.1)
        if: steps.check.outputs.exists == 'false'
        run: npm install -g npm@latest

      - name: Install Dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm install

      - name: Publish to NPM Beta Tag
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public --tag beta --provenance

      - name: Confirm Publication
        if: steps.check.outputs.exists == 'false'
        run: echo "Successfully published branch ${{ github.ref_name }} to npm with tag 'beta'."

  publish-main:
    name: Publish Main Package
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      - name: Check if version already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking $NAME@$VERSION ..."
          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already exists on npm — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION not found on npm — will publish."
          fi

      - name: Upgrade npm (OIDC Trusted Publishing requires npm >= 11.5.1)
        if: steps.check.outputs.exists == 'false'
        run: npm install -g npm@latest

      - name: Install Dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm install

      - name: Publish to NPM Latest Tag
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public --tag latest --provenance

      - name: Confirm Publication
        if: steps.check.outputs.exists == 'false'
        run: echo "Successfully published branch ${{ github.ref_name }} to npm with tag 'latest'."
